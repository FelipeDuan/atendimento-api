services:
  postgres:
    image: 'postgres:17'
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    labels:
      org.springframework.boot.ignore: "true"
  redis:
    image: 'redis:7'
    ports:
      - ${REDIS_PORT}:6379
