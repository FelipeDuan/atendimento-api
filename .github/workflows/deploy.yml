name: Deploy

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente alvo (qa ou production)
        required: true
        type: choice
        options:
          - qa
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Testes (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
      - run: ./gradlew test spotlessCheck checkstyleMain checkstyleTest --no-daemon

  docker:
    name: Build e push imagem
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Nome da imagem (GHCR exige minúsculas)
        id: image
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-qa:
    name: Deploy QA (develop)
    needs: docker
    if: |
      needs.docker.result == 'success' &&
      (github.ref == 'refs/heads/develop' ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'qa'))
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Disparar deploy QA
        run: |
          curl -fsS -X POST "${{ vars.DOKPLOY_SERVER_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ vars.DOKPLOY_QA_APP_ID }}\"}"

  deploy-production:
    name: Deploy Produção (main)
    needs: docker
    if: |
      needs.docker.result == 'success' &&
      (github.ref == 'refs/heads/main' ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'production'))
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Disparar deploy produção
        run: |
          curl -fsS -X POST "${{ vars.DOKPLOY_SERVER_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ vars.DOKPLOY_PROD_APP_ID }}\"}"
