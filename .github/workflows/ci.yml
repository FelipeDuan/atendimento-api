name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - name: Executar testes
        run: ./gradlew test --no-daemon

      - name: Publicar relatório JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports-${{ github.run_id }}
          path: build/test-results/test/
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - name: Formatação e Checkstyle
        run: ./gradlew spotlessCheck checkstyleMain checkstyleTest --no-daemon
